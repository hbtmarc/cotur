<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cotur</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>

  <div id="app-shell" class="app-shell hidden">

    <!-- Topbar -->
    <header class="topbar">
      <div class="topbar-brand">Cotur</div>
      <nav class="topbar-nav">
        <a href="#/home">Início</a>
        <a href="#/documentos">Documentos</a>
        <a href="#/historico">Histórico</a>
      </nav>
      <div class="topbar-actions">
        <span id="user-name" class="user-name"></span>
        <button id="btn-logout" class="btn-text hidden">Sair</button>
      </div>
    </header>

    <!-- Main content -->
    <main id="view-outlet" class="view-outlet"></main>

  </div>

  <!-- Config warning banner -->
  <div id="config-warning" class="config-warning hidden">
    ⚠️ Modo configuração — Firebase não configurado. Algumas funcionalidades estarão indisponíveis.
  </div>

  <!-- Firebase SDK via CDN (compat) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

  <!-- App bootstrap (module) -->
  <script type="module" src="assets/js/app.js"></script>

</body>
</html>
