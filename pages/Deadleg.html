<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Trechos Mortos (Deadlegs) — Alerta Técnico</title>
<style>
/* ── Reset & base ─────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#e8e8e8;padding:28px 0 48px;font-family:Georgia,'Times New Roman',serif}

/* ── A4 page ──────────────────────────────────────────────────── */
.a4-page{
  background:#fff;color:#1a1a1a;
  width:210mm;min-height:297mm;
  margin:0 auto 28px;
  padding:0 0 24mm;
  font-size:10pt;line-height:1.72;
  position:relative;
  box-shadow:0 4px 24px rgba(0,0,0,.14);
}

/* ═══════════════════════════════════════════════════════════════
   HERO — amber alert band
   ═══════════════════════════════════════════════════════════════ */
.hero{
  background:#b45309;
  color:#fff;
  padding:12mm 18mm 9mm;
  position:relative;
  overflow:hidden;
}
.hero::before{
  content:'';
  position:absolute;inset:0;
  background:repeating-linear-gradient(
    135deg,
    transparent,transparent 18px,
    rgba(0,0,0,.07) 18px,rgba(0,0,0,.07) 36px
  );
}
.hero-eyebrow{
  display:inline-flex;align-items:center;gap:6px;
  font-family:system-ui,sans-serif;font-size:7.5pt;font-weight:700;
  letter-spacing:.12em;text-transform:uppercase;
  background:rgba(0,0,0,.25);border-radius:4px;
  padding:2px 8px;margin-bottom:4mm;
  position:relative;z-index:1;
}
.hero-eyebrow .dot{
  width:6px;height:6px;border-radius:50%;
  background:#fbbf24;display:inline-block;
}
.hero-title{
  font-family:system-ui,sans-serif;
  font-size:26pt;font-weight:900;
  line-height:1.1;letter-spacing:-.015em;
  margin-bottom:3mm;
  position:relative;z-index:1;
}
.hero-title em{color:#fde68a;font-style:normal}
.hero-subtitle{
  font-size:11.5pt;line-height:1.5;
  color:rgba(255,255,255,.88);
  max-width:140mm;
  position:relative;z-index:1;
  font-style:italic;
}
.hero-stats-row{
  display:flex;gap:8mm;margin-top:7mm;
  position:relative;z-index:1;
  flex-wrap:wrap;
}
.hero-stat{
  background:rgba(0,0,0,.22);
  border:1px solid rgba(255,255,255,.18);
  border-radius:6px;
  padding:3mm 5mm;
  text-align:center;
  min-width:30mm;
  flex:1;
}
.hero-stat-value{
  font-family:system-ui,sans-serif;
  font-size:22pt;font-weight:900;
  color:#fde68a;line-height:1;
  display:block;
}
.hero-stat-label{
  font-family:system-ui,sans-serif;
  font-size:7pt;text-transform:uppercase;letter-spacing:.06em;
  color:rgba(255,255,255,.75);
  display:block;margin-top:1.5mm;
}
.hero-rule{
  height:3px;
  background:linear-gradient(90deg,#fbbf24 0%,#b45309 60%,transparent 100%);
}

/* ═══════════════════════════════════════════════════════════════
   PAGE BODY padding
   ═══════════════════════════════════════════════════════════════ */
.page-body{padding:10mm 18mm 0}

/* ═══════════════════════════════════════════════════════════════
   SECTION WRAPPER
   ═══════════════════════════════════════════════════════════════ */
.doc-section{
  margin-bottom:10mm;
  break-inside:avoid;
  page-break-inside:avoid;
}
.doc-section--break{break-before:page;page-break-before:always}

.section-heading{
  display:flex;align-items:baseline;gap:7px;
  font-family:system-ui,sans-serif;
  font-size:11pt;font-weight:700;
  color:#1a1a1a;
  border-bottom:2px solid #e69a0a;
  padding-bottom:2mm;margin-bottom:5mm;
}
.section-heading .sec-num{
  font-size:7.5pt;font-weight:400;color:#b45309;
  letter-spacing:.05em;flex-shrink:0;
}

/* Generic prose */
.prose{font-size:9.5pt;line-height:1.75;color:#222;margin-bottom:3.5mm}
.prose:last-child{margin-bottom:0}

/* ═══════════════════════════════════════════════════════════════
   STAT CARDS ROW
   ═══════════════════════════════════════════════════════════════ */
.stat-cards{display:flex;gap:5mm;margin-bottom:5mm;flex-wrap:wrap}
.stat-card{
  flex:1;min-width:30mm;
  border:1.5px solid #fde68a;
  border-top:4px solid #e69a0a;
  border-radius:4px;padding:4mm 5mm;
  background:#fffbf0;
  break-inside:avoid;
}
.stat-card-value{
  font-family:system-ui,sans-serif;
  font-size:20pt;font-weight:900;color:#b45309;
  line-height:1;display:block;margin-bottom:1.5mm;
}
.stat-card-label{
  font-family:system-ui,sans-serif;
  font-size:7.5pt;font-weight:600;text-transform:uppercase;
  letter-spacing:.05em;color:#6b4a00;
}
.stat-card-desc{
  font-size:8.5pt;color:#555;margin-top:2mm;line-height:1.5;
}

/* ═══════════════════════════════════════════════════════════════
   DEFINITION BOX
   ═══════════════════════════════════════════════════════════════ */
.def-box{
  border:1.5px solid #d0d0d0;border-left:4px solid #1a56db;
  border-radius:0 4px 4px 0;
  padding:4mm 6mm;margin-bottom:5mm;
  background:#f8faff;break-inside:avoid;
}
.def-term{
  font-family:system-ui,sans-serif;
  font-size:9.5pt;font-weight:700;color:#1a56db;
  margin-bottom:1.5mm;
}
.def-text{font-size:9.5pt;line-height:1.7;color:#222}

/* Examples row */
.example-chips{display:flex;flex-wrap:wrap;gap:3mm;margin-bottom:4mm}
.chip{
  font-family:system-ui,sans-serif;font-size:8pt;
  border:1px solid #ccc;border-radius:20px;
  padding:1.5mm 5mm;color:#333;background:#f5f5f5;
}
.chip.chip-warn{background:#fff7e6;border-color:#e69a0a;color:#7a4800}

/* ═══════════════════════════════════════════════════════════════
   RISK CARDS GRID
   ═══════════════════════════════════════════════════════════════ */
.risk-grid{
  display:grid;grid-template-columns:1fr 1fr;
  gap:4mm;margin-bottom:4mm;
}
.risk-card{
  border:1px solid #e0e0e0;border-top:3px solid #b45309;
  border-radius:4px;padding:4mm;
  background:#fff;break-inside:avoid;
}
.risk-card-icon{font-size:14pt;margin-bottom:2mm;display:block}
.risk-card-title{
  font-family:system-ui,sans-serif;
  font-size:8.5pt;font-weight:700;color:#1a1a1a;
  margin-bottom:1.5mm;
}
.risk-card-body{font-size:8pt;color:#444;line-height:1.6}
.risk-card.risk-card--red{border-top-color:#dc2626}
.risk-card.risk-card--amber{border-top-color:#d97706}
.risk-card.risk-card--slate{border-top-color:#475569}

/* Warning callout */
.callout{
  display:flex;gap:4mm;align-items:flex-start;
  background:#fff8e1;border-left:4px solid #f59e0b;
  border-radius:0 4px 4px 0;padding:4mm 5mm;
  margin-bottom:4mm;break-inside:avoid;
}
.callout-icon{font-size:11pt;flex-shrink:0;line-height:1.5}
.callout-body{font-size:9pt;color:#4a3a00;line-height:1.65}
.callout-body strong{color:#7c4a00}

/* ═══════════════════════════════════════════════════════════════
   TIMELINE
   ═══════════════════════════════════════════════════════════════ */
.timeline{position:relative;padding-left:14mm;margin-bottom:4mm}
.timeline::before{
  content:'';position:absolute;left:4.5mm;top:3mm;bottom:3mm;
  width:2px;background:#e69a0a;border-radius:1px;
}
.tl-item{position:relative;margin-bottom:4.5mm;break-inside:avoid}
.tl-item:last-child{margin-bottom:0}
.tl-dot{
  position:absolute;left:-10mm;top:1.5mm;
  width:9px;height:9px;border-radius:50%;
  background:#b45309;border:2px solid #fff;
  box-shadow:0 0 0 1.5px #b45309;
}
.tl-item.tl-critical .tl-dot{background:#dc2626;box-shadow:0 0 0 1.5px #dc2626}
.tl-year{
  font-family:system-ui,sans-serif;font-size:7pt;font-weight:700;
  color:#b45309;letter-spacing:.06em;text-transform:uppercase;
  margin-bottom:.5mm;
}
.tl-item.tl-critical .tl-year{color:#dc2626}
.tl-event{font-size:9pt;color:#222;line-height:1.6}
.tl-event strong{font-family:system-ui,sans-serif;font-weight:700;color:#1a1a1a}
.tl-tag{
  display:inline-block;font-family:system-ui,sans-serif;
  font-size:6.5pt;font-weight:600;text-transform:uppercase;letter-spacing:.05em;
  padding:1px 5px;border-radius:3px;margin-left:4px;vertical-align:middle;
}
.tag-fatal{background:#fee2e2;color:#991b1b}
.tag-corrosion{background:#fff7e6;color:#92400e}
.tag-deposit{background:#f0fdf4;color:#166534}
.tag-h2s{background:#f5f3ff;color:#5b21b6}

/* ═══════════════════════════════════════════════════════════════
   TREATMENT FLOW
   ═══════════════════════════════════════════════════════════════ */
.flow-container{display:flex;flex-direction:column;align-items:center;gap:0;margin-bottom:4mm}
.flow-box{
  font-family:system-ui,sans-serif;font-size:8.5pt;font-weight:600;
  text-align:center;padding:3mm 8mm;border-radius:6px;
  line-height:1.4;break-inside:avoid;min-width:80mm;
}
.flow-box.flow-start{background:#1a56db;color:#fff}
.flow-arrow{
  width:2px;height:7mm;background:#999;
  position:relative;align-self:center;
}
.flow-arrow::after{
  content:'';position:absolute;bottom:-3px;left:50%;transform:translateX(-50%);
  border:4px solid transparent;border-top:5px solid #999;
}
.flow-arrow-label{font-family:system-ui,sans-serif;font-size:7pt;color:#777;text-align:center;margin:-1mm 0 1mm}
.flow-branches{display:grid;grid-template-columns:1fr 1fr;gap:6mm;width:100%;margin-top:0}
.flow-branch{display:flex;flex-direction:column;align-items:center;gap:2mm}
.flow-branch-label{font-family:system-ui,sans-serif;font-size:7.5pt;font-weight:700;color:#555;text-align:center}
.flow-box.flow-yes{background:#166534;color:#fff;min-width:auto;width:100%}
.flow-box.flow-no{background:#7c3aed;color:#fff;min-width:auto;width:100%}
.flow-subitems{width:100%;display:flex;flex-direction:column;gap:1.5mm;margin-top:1mm}
.flow-sub{
  font-family:system-ui,sans-serif;font-size:7.5pt;
  background:#f1f5f9;border-left:3px solid #94a3b8;
  padding:2mm 3mm;border-radius:0 3px 3px 0;color:#334155;
}
.flow-sub.sub-green{background:#f0fdf4;border-left-color:#22c55e;color:#14532d}
.flow-sub.sub-violet{background:#faf5ff;border-left-color:#a78bfa;color:#3b0764}

/* ═══════════════════════════════════════════════════════════════
   CHECKLIST
   ═══════════════════════════════════════════════════════════════ */
.checklist{display:flex;flex-direction:column;gap:2.5mm;margin-bottom:4mm}
.check-item{
  display:flex;align-items:flex-start;gap:4mm;
  font-size:9pt;color:#222;line-height:1.6;break-inside:avoid;
}
.check-box{
  width:13px;height:13px;border:2px solid #1a56db;
  border-radius:2px;flex-shrink:0;margin-top:.8mm;
  background:#fff;position:relative;
}
.check-category{
  font-family:system-ui,sans-serif;font-size:7.5pt;font-weight:700;
  text-transform:uppercase;letter-spacing:.06em;color:#b45309;
  margin-bottom:1.5mm;margin-top:3mm;
}

/* ═══════════════════════════════════════════════════════════════
   FINAL TAKEAWAY
   ═══════════════════════════════════════════════════════════════ */
.takeaway{
  background:#1a1a2e;color:#fff;
  border-radius:6px;padding:6mm 7mm;break-inside:avoid;
}
.takeaway-label{
  font-family:system-ui,sans-serif;font-size:7pt;font-weight:700;
  text-transform:uppercase;letter-spacing:.12em;color:#fbbf24;margin-bottom:3mm;
}
.takeaway-text{font-size:11pt;line-height:1.65;font-style:italic;color:#e2e8f0}
.takeaway-text strong{font-style:normal;color:#fde68a}

/* ═══════════════════════════════════════════════════════════════
   FOOTER
   ═══════════════════════════════════════════════════════════════ */
.doc-footer{
  position:absolute;bottom:8mm;left:18mm;right:18mm;
  display:flex;justify-content:space-between;
  font-family:system-ui,sans-serif;font-size:7pt;
  color:#aaa;border-top:1px solid #e8e8e8;padding-top:2.5mm;
}
.doc-footer-brand{font-weight:700;letter-spacing:.05em;color:#b45309}

/* ═══════════════════════════════════════════════════════════════
   PRINT
   ═══════════════════════════════════════════════════════════════ */
@page{size:A4 portrait;margin:0}
@media print{
  body{background:#fff;padding:0}
  .a4-page{margin:0;box-shadow:none}
  *{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .doc-section--break{break-before:page;page-break-before:always}
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#f0f0f0;padding:24px 0}
.a4-page{background:#fff;color:#1a1a1a;width:210mm;min-height:297mm;margin:0 auto;
  padding:14mm 18mm 22mm;font-family:Georgia,'Times New Roman',serif;font-size:10.5pt;
  line-height:1.7;position:relative}
.preview-cover-accent{width:40px;height:4px;background:#1a56db;border-radius:2px;margin-bottom:5mm}
.preview-doc-title{font-family:system-ui,sans-serif;font-size:24pt;font-weight:800;
  line-height:1.15;letter-spacing:-.01em;color:#0d0d0d;margin-bottom:3mm}
.preview-doc-desc{font-size:11.5pt;color:#555;margin-bottom:5mm;font-style:italic}
.preview-doc-meta{display:flex;align-items:center;flex-wrap:wrap;gap:6px 14px;
  font-family:system-ui,sans-serif;font-size:8pt;color:#777;margin-bottom:4mm}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;
  font-family:system-ui,sans-serif;font-size:8pt;font-weight:600}
.badge-gray{background:#f1f5f9;color:#475569}.badge-green{background:#dcfce7;color:#166534}
.badge-yellow{background:#fef9c3;color:#854d0e}.badge-red{background:#fee2e2;color:#991b1b}
.preview-cover-rule{height:2px;background:linear-gradient(90deg,#1a56db 0%,#d0d0d0 60%,transparent 100%);margin-bottom:10mm}
.preview-content{counter-reset:sec-counter}
.preview-section{margin-bottom:9mm;break-inside:avoid;page-break-inside:avoid}
.preview-section--break-before{break-before:page;page-break-before:always}
.preview-section-title{font-family:system-ui,sans-serif;font-size:12.5pt;font-weight:700;
  color:#0d0d0d;margin-bottom:4mm;padding-bottom:2mm;border-bottom:1.5px solid #d0d0d0;
  display:flex;align-items:baseline;gap:8px;counter-increment:sec-counter}
.preview-section-title::before{content:counter(sec-counter,decimal-leading-zero);
  font-size:8pt;font-weight:400;color:#1a56db;letter-spacing:.04em;flex-shrink:0}
.preview-blocks{display:flex;flex-direction:column;gap:3.5mm}
.preview-block{break-inside:avoid;page-break-inside:avoid}
.preview-block-texto p{white-space:pre-wrap;word-break:break-word;orphans:3;widows:3}
.preview-block-destaque{display:flex;gap:4mm;align-items:flex-start;background:#fef9ed;
  border-left:3px solid #e69a0a;padding:3.5mm 5mm;border-radius:0 3px 3px 0;font-style:italic}
.preview-destaque-icon{font-size:11pt;flex-shrink:0;opacity:.75}
.preview-block-destaque p{white-space:pre-wrap;word-break:break-word;color:#4a3a00}
.preview-list{margin:0;padding-left:7mm;list-style:none}
.preview-list li{margin-bottom:1.5mm;padding-left:2mm;position:relative}
.preview-list li::before{content:'–';position:absolute;left:-4mm;color:#1a56db;font-weight:700}
.preview-block-quebra{break-before:page;page-break-before:always}
.preview-quebra-label{display:none}
.preview-doc-footer{position:absolute;bottom:10mm;left:18mm;right:18mm;display:flex;
  justify-content:space-between;font-family:system-ui,sans-serif;font-size:7.5pt;
  color:#bbb;border-top:1px solid #e8e8e8;padding-top:2.5mm}
.preview-footer-brand{font-weight:700;letter-spacing:.04em;color:#1a56db}
.preview-footer-title{font-style:italic;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:60%}
@page{size:A4 portrait;margin:0}
@media print{body{background:#fff;padding:0}
  .a4-page{margin:0;box-shadow:none}
  *{-webkit-print-color-adjust:exact;print-color-adjust:exact}}

</style>
</head>
